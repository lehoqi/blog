      <div class="lb-total-stars">⭐ ${heroStats.totalStars} 颗星星</div>
      <div class="lb-total-score">总分 ${heroStats.totalScore} 分</div>
      <div class="lb-games">答题 ${heroStats.games} 次 · 满分 ${heroStats.perfectGames} 次</div>
      <div class="lb-rank-title">${getTitle(heroStats, 'hero')}</div>
    </div>
  `;

  // ── 最近记录 ──
  const allRecords = loadRecords().slice(-10).reverse();
  const histList = $('lb-history-list');
  if (allRecords.length === 0) {
    histList.innerHTML = '<span style="color:#bdbdbd;font-size:0.9rem;">还没有记录哦，快去答题吧！</span>';
  } else {
    histList.innerHTML = allRecords.map(r => {
      const pr = PLAYERS[r.player] || { vehicle: '🚒', name: '?' };
      const d = new Date(r.date);
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `<div class="lb-history-item">
        <span class="hi-player">${comboAvatar(r.player)} ${pr.name}</span>
        <span class="hi-score">${r.score}/${r.total}</span>
        <span class="hi-stars">${'⭐'.repeat(r.stars)}</span>
        <span class="hi-date">${dateStr}</span>
      </div>`;
    }).join('');
  }
}

// ── 准备页预览 ──
function updatePlayerPreview() {
  const stats = getPlayerStats('hero');
  $('hero-name').textContent = PLAYERS.hero.name;
  $('hero-preview-stars').textContent = `⭐ ${stats.totalStars}`;
  $('hero-preview-title').textContent = getTitle(stats, 'hero');
}

// ── 编辑名字 ──
function editPlayerName(playerId) {
  const current = PLAYERS[playerId].name;
  const nameEl = $(`${playerId}-name`);
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.maxLength = 6;
  input.className = 'name-input';
  input.style.cssText = 'width:80px;font-size:1.4rem;font-weight:900;text-align:center;border:2px solid ' +
    PLAYERS[playerId].color + ';border-radius:10px;padding:2px 6px;outline:none;';

  nameEl.replaceWith(input);
  input.addEventListener('click', e => e.stopPropagation());
  input.focus();
  input.select();

  function finish() {
    const val = input.value.trim();
    const newName = val.length > 0 ? val : current;
    savePlayerName(newName);
    const span = document.createElement('span');
    span.className = 'player-name';
    span.id = `${playerId}-name`;
    span.textContent = newName;
    input.replaceWith(span);
  }

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

// ── 页面切换 ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $(id).classList.add('active');
}

function openSettings() {
  $('chk-show-equation').checked = loadShowEquation();
  $('chk-speak-equation').checked = loadSpeakEquation();
  showPage('settings-page');
}

// ── 游戏启动 ──
function startGame() {
  questions     = generateQuestions(5);
  currentIdx    = 0;
  score         = 0;
  correctStreak = 0;
  tagScores     = { fire: 0, general: 0 };
  buildNumpad();
  updatePlayerIndicator();
  showPage('quiz-page');
  $('progress-bar').style.width = '0%';
  renderQuestion(false);
}

// ── 事件绑定 ──
$('btn-start').addEventListener('click', () => {
  playStart();
  updatePlayerPreview();
  showPage('player-page');
  speak('准备好了吗？点击消防车出发吧！');
});

$('pick-hero').addEventListener('click', () => {
  currentPlayer = 'hero';
  playStart();
  speak(`${PLAYERS.hero.name}出发！`);
  startGame();
});

$('edit-hero').addEventListener('click', e => {
  e.stopPropagation();
  editPlayerName('hero');
});

$('btn-next-q').addEventListener('click', () => {
  $('btn-next-q').classList.add('hidden');
  currentIdx++;
  if (currentIdx >= questions.length) showResult();
  else renderQuestion();
});

$('btn-restart').addEventListener('click', () => {
  playStart();
  startGame();
});

$('btn-back-result').addEventListener('click', () => {
  updatePlayerPreview();
  showPage('player-page');
});

function openLeaderboard() {
  renderLeaderboard();
  showPage('leaderboard-page');
  const st = getPlayerStats('hero');
  if (st.games === 0) {
    speak('还没有记录哦，快去答题吧！');
    return;
  }
  const n = PLAYERS.hero.name;
  setTimeout(() => speak(`${n}已经累计 ${st.totalStars} 颗星星，继续加油！`, 0.9), 400);
}

$('btn-settings-home').addEventListener('click', () => {
  playClick();
  openSettings();
});
$('btn-back-settings').addEventListener('click', () => {
  playClick();
  showPage('start-page');
});
$('chk-show-equation').addEventListener('change', () => {
  saveShowEquation($('chk-show-equation').checked);
});
$('chk-speak-equation').addEventListener('change', () => {
  saveSpeakEquation($('chk-speak-equation').checked);
});

$('btn-reread').addEventListener('click', () => {
  playClick();
  rereadCurrentQuestion();
});

$('btn-lb-home').addEventListener('click', openLeaderboard);
$('btn-lb-player').addEventListener('click', openLeaderboard);
$('btn-lb-result').addEventListener('click', openLeaderboard);
$('btn-back-lb').addEventListener('click', () => {
  updatePlayerPreview();
  showPage('player-page');
});

$('btn-clear-data').addEventListener('click', () => {
  if (confirm('确定要清除所有记录吗？这个操作不能撤回哦！')) {
    clearRecords();
    localStorage.removeItem(PLAYER_NAME_KEY);
    PLAYERS.hero.name = DEFAULT_PLAYER_NAME;
    renderLeaderboard();
    updatePlayerPreview();
  }
});

document.addEventListener('keydown', e => {
  if ($('quiz-page').classList.contains('active')) {
    if (e.key>='0' && e.key<='9') inputDigit(e.key);
    else if (e.key==='Backspace')  deleteDigit();
    else if (e.key==='Enter')      submitAnswer();
  }
});
</script>
